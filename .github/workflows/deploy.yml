name: Build and Deploy Sys Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Get dependencies
        run: go mod tidy

      - name: Run tests
        run: go test ./... -v -count=1

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Get dependencies
        run: go mod tidy

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o bootstrap

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap
          path: bootstrap
          retention-days: 1

  deploy-fc:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bootstrap
          path: build_artifacts

      - name: Package binary
        run: |
          cd build_artifacts
          chmod 777 bootstrap
          zip ../code.zip bootstrap

      - name: Install Serverless Devs
        run: npm install -g @serverless-devs/s

      - name: Configure credentials
        run: |
          s config add \
            --AccessKeyID "${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_ID }}" \
            --AccessKeySecret "${{ secrets.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}" \
            --access default

      - name: Deploy to FC
        env:
          ASTRA_SERVER_PORT: "9001"
          ASTRA_DB_TYPE: "sqlite"
          ASTRA_DB_PATH: "/data/astra/astra_schedule.db"
          ASTRA_SYS_DB_TYPE: "sqlite"
          ASTRA_SYS_DB_PATH: "/data/astra/sys_backend.db"
          ASTRA_ASTRA_URL: ${{ secrets.ASTRA_BACKEND_URL }}
          ASTRA_ASTRA_TOKEN: ${{ secrets.ASTRA_SECRET_TOKEN }}
          ASTRA_CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ASTRA_CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          ASTRA_CLOUDFLARE_DOMAIN: "getastra.cn"
          ASTRA_LOG_DEBUG: "false"
        run: s deploy -t s.yaml --function code -y
